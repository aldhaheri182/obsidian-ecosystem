# ============================================================================
# docker-compose.yml — M0 full stack for the Obsidian Ecosystem.
# Authorized by: GitHub issue #15; M0 plan §"Component inventory".
#
# 8 containers total:
#   Infrastructure: nats, redis, clickhouse
#   Core services: chronos (time-oracle), tape-recorder
#   Aletheia city: aletheia-core (Rust), aletheia-logic (Python)
# Memory budget: ~5.5 GB. Fits on the 64 GB Linux VM with headroom.
# ============================================================================

services:
  # ---------- Infrastructure ----------

  nats:
    image: nats:2.11-alpine
    # All server config (port, http_port, jetstream with store_dir, and
    # websocket gateway on 8080) lives in the mounted conf file. CLI is
    # minimal to avoid "duplicate config" errors from NATS.
    command:
      - "-c"
      - "/etc/nats/nats-server.conf"
    ports:
      - "14222:4222"      # client
      - "18222:8222"      # monitoring / healthcheck
      - "18080:8080"      # websocket gateway (browser -> ws://localhost:18080)
    volumes:
      - nats-data:/data/jetstream
      - ./infrastructure/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "900mb"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      # The alpine entrypoint disables network access for `default` if
      # no user/password is set. So we create obsidian/obsidian explicitly
      # for M0. Tape-recorder and test harness use these creds. Vault-
      # issued credentials arrive in M3.
      CLICKHOUSE_DB: obsidian
      CLICKHOUSE_USER: obsidian
      CLICKHOUSE_PASSWORD: obsidian
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # `clickhouse-client` is always in the image. Alpine's busybox wget
      # has known issues resolving localhost inside the container.
      test: ["CMD-SHELL", "clickhouse-client --user obsidian --password obsidian --query 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2g

  # ---------- Core services ----------

  chronos:
    build:
      context: .
      dockerfile: core/time-oracle/Dockerfile
    environment:
      AGENT_ID: time-oracle-01
      CITY: chronos
      NATS_URL: nats://nats:4222
      LEDGER_PATH: /data/ledger
      CHRONOS_TICK_INTERVAL_MS: "1000"
      LOG_LEVEL: info
    volumes:
      - ./ledger-data:/data/ledger
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  tape-recorder:
    build:
      context: .
      dockerfile: core/tape-recorder/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: obsidian
      CLICKHOUSE_PASSWORD: obsidian
      TAPE_CLICKHOUSE_DB: obsidian
      TAPE_CLICKHOUSE_TABLE: tape
      TAPE_BATCH_SIZE: "1000"
      TAPE_BATCH_INTERVAL_MS: "1000"
      LOG_LEVEL: info
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------- Aletheia city ----------

  aletheia-core:
    # Hosts the Rust-native latency-critical agents: collector (CSV) +
    # risk-overlord. Each is its own process for M0 simplicity; M1 can merge
    # them under a shared supervisor.
    build:
      context: .
      dockerfile: cities/aletheia/aletheia-core.Dockerfile
    environment:
      CITY: aletheia
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      LEDGER_PATH: /data/ledger
      CSV_FIXTURE_PATH: /fixtures/aapl_2023-03-13_1min.csv
      CSV_PLAYBACK_SPEED: "1000.0"
      RISK_MAX_GROSS_EXPOSURE_USD_CENTS: "10000000000"
      RISK_MAX_POSITION_USD_CENTS: "2500000000"
      RISK_MAX_DAILY_LOSS_USD_CENTS: "1500000000"
      LOG_LEVEL: info
    volumes:
      - ./ledger-data:/data/ledger
      - ./tests/fixtures:/fixtures:ro
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      chronos:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m

  aletheia-logic:
    # Hosts the Python agents: momentum-signal, signal-blender, paper-executor.
    build:
      context: .
      dockerfile: cities/aletheia/aletheia-logic.Dockerfile
    environment:
      CITY: aletheia
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      LEDGER_PATH: /data/ledger
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      LOG_LEVEL: info
    volumes:
      - ./ledger-data:/data/ledger
    depends_on:
      nats:
        condition: service_healthy
      aletheia-core:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------- M1 Memory Fabric (issue #22) ----------

  postgres:
    # PostgreSQL 16 + TimescaleDB 2.16 per whitepaper §15.3. Houses the
    # relational + time-series side of the Memory Fabric. Apache AGE (the
    # Postgres-native graph option) is a fallback documented in §5; primary
    # graph store for M1 is Neo4j (below).
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_DB: obsidian
      POSTGRES_USER: obsidian
      POSTGRES_PASSWORD: obsidian
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsidian -d obsidian"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 1g

  neo4j:
    # Neo4j 5.22 Community. Primary Knowledge Graph store for M1 per
    # whitepaper §5.3. Apache AGE above is the fallback / portability option.
    image: neo4j:5.22-community
    environment:
      NEO4J_AUTH: neo4j/obsidian-m1
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "17474:7474"  # HTTP
      - "17687:7687"  # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1500m

  qdrant:
    # Qdrant 1.11 vector store per whitepaper §5 — holds embeddings of
    # reflections, news, and agent memory nodes.
    image: qdrant/qdrant:v1.11.5
    ports:
      - "16333:6333"  # HTTP
      - "16334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    # MinIO S3-compatible blob store. For dev use; production uses real S3.
    # Stores: ledger-snapshot archival (daily), model checkpoints, replay
    # artifacts, board meeting minutes PDFs, dream-session recordings.
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: obsidian
      MINIO_ROOT_PASSWORD: obsidian-minio
    ports:
      - "19001:9000"  # S3 API
      - "19002:9001"  # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  nats-data:
  clickhouse-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  minio-data:
