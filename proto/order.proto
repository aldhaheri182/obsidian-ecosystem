// ============================================================================
// proto/order.proto
//
// Order requests and fill reports.
// Authorized by: spec Part 22.3, 22.4 and §9.6 (Aletheia Execution agents).
//
// Producers:  `paper-executor` (M0), later the Execution Router and Slicer.
// Consumers:  `risk-overlord` (pre-trade check), `tape-recorder`, and the
//             UI for animating order flow.
//
// Prices and commissions are represented in USD cents as signed 64-bit
// integers to avoid double-precision surprises on long-horizon P&L aggregates.
// ============================================================================

syntax = "proto3";
package obsidian;

option go_package = "github.com/aldhaheri182/obsidian-ecosystem/proto/obsidian";

message OrderRequest {
  // UUID v7. Generated by the Execution agent; unique for the lifetime of
  // the Ecosystem (no reuse across replays).
  string order_id = 1;

  string symbol = 2;

  // "BUY" or "SELL". Short sales are encoded as "SELL" with an explicit
  // negative starting position; the Risk Overlord verifies borrow.
  string side = 3;

  // Quantity in shares/contracts. Always positive.
  uint64 quantity = 4;

  // "LIMIT", "MARKET", "STOP", "STOP_LIMIT".
  string order_type = 5;

  // Limit price in USD cents × 10^4 (i.e. fixed-point with 4 decimal places
  // beyond the cent, giving 1/100,000,000 of a dollar resolution). 0 for
  // MARKET orders. See the `price_scaled` convention in
  // core/obsidian-bus/src/prices.rs.
  int64 limit_price_scaled = 6;

  // "DAY", "IOC", "FOK", "GTC".
  string time_in_force = 7;

  // Router hint. Canonical values: "AGGRESSIVE", "PASSIVE", "TWAP",
  // "VWAP". M0 uses "AGGRESSIVE" only (simple limit-at-ask).
  string execution_strategy = 8;

  // message_id of the Signal that authorized this order. Enforced by the
  // Risk Overlord pre-trade: no parent Signal → no order.
  string parent_signal_id = 9;
}

message FillReport {
  // Must match the `order_id` of the authorizing OrderRequest.
  string order_id = 1;

  // Actual fill price in the same fixed-point scale as `limit_price_scaled`.
  int64 fill_price_scaled = 2;

  // Partial fills are supported; sum of fill_quantity across all FillReports
  // for an order MUST NOT exceed the OrderRequest's quantity.
  uint64 fill_quantity = 3;

  // Commission in USD cents × 10^4 (same scale as prices). Signed because
  // rebates are negative.
  int64 commission_scaled = 4;

  // Execution venue (e.g. "NASDAQ", "IEX", "ALPACA-PAPER").
  string venue = 5;

  // Venue's reported timestamp in nanoseconds since Unix epoch.
  uint64 timestamp_ns = 6;
}
