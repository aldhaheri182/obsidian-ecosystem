<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian Observatory — Aletheia (M0)</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a12; color: #e0e0e8;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #app { height: 100vh; display: grid; grid-template-columns: 1fr 320px; }
      #city { position: relative; }
      #sidebar { background: #15151f; border-left: 1px solid #2a2a3a; padding: 16px;
                  overflow-y: auto; }
      h1 { font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 12px; }
      .emergency { background: #b00020; color: white; border: none; padding: 12px 16px;
                    font-weight: bold; letter-spacing: 0.05em; cursor: pointer; width: 100%; }
      .emergency:hover { background: #d50020; }
      .pause { background: #cf8a00; margin-top: 8px; }
      .pause:hover { background: #ef9a00; }
      #log { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; line-height: 1.6;
              margin-top: 16px; max-height: 400px; overflow-y: auto; }
      #log .entry { padding: 2px 4px; border-bottom: 1px solid #2a2a3a; }
      #status { margin-top: 12px; font-size: 12px; }
      #agents { list-style: none; padding: 0; margin: 0; }
      #agents li { display: flex; justify-content: space-between; padding: 4px 0;
                    font-size: 12px; border-bottom: 1px solid #2a2a3a; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
              margin-right: 6px; vertical-align: middle; }
      .dot.active { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
      .dot.stale { background: #888; }
      .dot.error { background: #e53935; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="city"></div>
      <div id="sidebar">
        <h1>Aletheia</h1>
        <button class="emergency" id="emergency-stop">EMERGENCY STOP</button>
        <button class="emergency pause" id="pause-trading">Pause Trading</button>
        <div id="status">
          <div>NATS: <span id="nats-state">connecting...</span></div>
          <div>Agents alive: <span id="agent-count">0</span> / 6</div>
        </div>
        <h1 style="margin-top:20px;">Agents</h1>
        <ul id="agents"></ul>
        <h1 style="margin-top:20px;">Tape (last 30)</h1>
        <div id="log"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
