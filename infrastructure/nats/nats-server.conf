# NATS 2.11 configuration for M0.
# - JetStream enabled for durable message queues.
# - WebSocket gateway on :8080 for the browser-side observatory.
# - Cluster-ready config left commented (single node in M0).

port: 4222
http_port: 8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 1GB
  max_file_store: 50GB
}

websocket {
  port: 8080
  no_tls: true  # M0 in docker-compose trust boundary; M3 adds mTLS via Istio.
}

max_payload: 16MB
